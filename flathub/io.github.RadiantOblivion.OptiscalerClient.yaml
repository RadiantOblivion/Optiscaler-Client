app-id: io.github.RadiantOblivion.OptiscalerClient
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet10
command: OptiscalerClient
finish-args:
  - --share=ipc
  - --socket=x11 #Avalonia is limited to X11 for now
  - --device=dri
  - --share=network # For fetching updates
  - --filesystem=home 
  - --filesystem=/media:rw
  - --filesystem=/run/media:rw
  - --filesystem=/sys:ro # For GPU detection
  - --talk-name=org.freedesktop.Notifications

build-options:
  append-path: /usr/lib/sdk/dotnet10/bin
  append-ld-library-path: /usr/lib/sdk/dotnet10/lib
  env:
    DOTNET_ROOT: /usr/lib/sdk/dotnet10
    DOTNET_CLI_TELEMETRY_OPTOUT: '1' # Opt out of telemetry

modules:
  - name: OptiscalerClient
    buildsystem: simple
    build-commands:
      # Publish the application
      - dotnet publish OptiscalerClient.csproj -c Release -r linux-x64 --self-contained true -o /app/OptiscalerClient --source nuget-sources
      
      # Create a symlink to the binary in /app/bin
      - install -d /app/bin
      - ln -s /app/OptiscalerClient/OptiscalerClient /app/bin/OptiscalerClient
      
      # Install desktop file and metainfo
      - install -Dm644 flathub/io.github.RadiantOblivion.OptiscalerClient.desktop /app/share/applications/io.github.RadiantOblivion.OptiscalerClient.desktop
      - install -Dm644 flathub/io.github.RadiantOblivion.OptiscalerClient.metainfo.xml /app/share/metainfo/io.github.RadiantOblivion.OptiscalerClient.metainfo.xml
      
      # Install icon
      - install -Dm644 flathub/io.github.RadiantOblivion.OptiscalerClient.png /app/share/icons/hicolor/512x512/apps/io.github.RadiantOblivion.OptiscalerClient.png
    sources:
      - type: archive
        url: https://github.com/RadiantOblivion/OptiscalerClient/archive/refs/tags/v1.5.2.zip
        sha256: 1714369500556877895631254363270241355537644204692158614504790944
      - nuget-sources.json
